name: Deploy to Screeps

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: yarn
      - run: yarn install --frozen-lockfile
      - name: Create screeps.json
        run: |
          echo '{"token":"${{ secrets.SCREEPS_TOKEN }}","protocol":"https","hostname":"screeps.com","port":443,"path":"/","branch":"default"}' > screeps.json
      - run: yarn deploy
